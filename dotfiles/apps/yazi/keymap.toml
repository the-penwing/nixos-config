# Minimal keymap for essential navigation and actions.
#:schema https://yazi-rs.github.io/schemas/keymap.json

[mgr]
keymap = [
  { on = "k", run = "arrow prev", desc = "Previous file" },
  { on = "j", run = "arrow next", desc = "Next file" },
  { on = "<Up>", run = "arrow prev", desc = "Previous file" },
  { on = "<Down>", run = "arrow next", desc = "Next file" },

  { on = "h", run = "leave", desc = "Parent directory" },
  { on = "l", run = "enter", desc = "Enter directory" },
  { on = "<Left>", run = "leave", desc = "Parent directory" },
  { on = "<Right>", run = "enter", desc = "Enter directory" },

  { on = "<Enter>", run = "open", desc = "Open selected" },
  { on = "o", run = "open", desc = "Open selected" },

  { on = "d", run = "remove", desc = "Trash selected" },
  { on = "D", run = "remove --permanently", desc = "Delete selected" },

  { on = "/", run = "find --smart", desc = "Search files" },
  { on = "<Esc>", run = "escape", desc = "Cancel" },
  { on = "q", run = "quit", desc = "Quit" },
]
