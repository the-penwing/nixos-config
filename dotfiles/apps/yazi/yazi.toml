# Yazi behaviour tuned for keyboard-first usage.
#
# Notes:
# - `linemode = "size"` gives quick file-size context in listings.
# - `show_hidden = true` is useful for Nix and dotfile-heavy workflows.
[manager]
show_hidden = true
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
linemode = "size"
show_symlink = true

[preview]
wrap = "yes"
tab_size = 2
max_width = 900
max_height = 900

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open", for = "linux" },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { name = "*.nix", use = "edit" },
  { name = "*.md", use = "edit" },
  { name = "*", use = "open" },
]
