# Minimal Yazi configuration.
[manager]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
show_hidden = false

[preview]
wrap = "yes"
tab_size = 2

[opener]
edit = [
  { run = "nvim %s", block = true, desc = "Open in nvim", for = "unix" },
]
open = [
  { run = "xdg-open %s1", desc = "Open", for = "linux" },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "application/pdf", use = "open" },
  { mime = "image/*", use = "open" },
  { mime = "*", use = "open" },
]

[log]
enabled = false
