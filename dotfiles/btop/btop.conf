# ============================================================
# Btop Configuration
# ============================================================

# Color theme (available themes in /usr/share/btop/themes/)
color_theme = "gruvbox_dark_v2"

# If the theme set background should be shown
theme_background = true

# Update interval in milliseconds
update_ms = 2000

# Layout: which panels to show
shown_boxes = "cpu mem net proc"

# ============================================================
# CPU
# ============================================================

# Show CPU temperature
check_temp = true

# CPU temperature source ("auto" or sensor name)
cpu_sensor = "Auto"

# Show temperature in Celsius
temp_scale = "celsius"

# ============================================================
# Memory
# ============================================================

# Show memory as percentage
mem_graphs = true

# Show swap info
show_swap = true

# Show disk IO stats
show_disks = true
disk_free_prct = false

# ============================================================
# Processes
# ============================================================

# Default sorting field
proc_sorting = "cpu lazy"

# Show processes in tree view
proc_tree = false

# Show process memory as percentage
proc_mem_bytes = true

# Enable vim-style navigation keys (h/j/k/l)
vim_keys = true

# ============================================================
# Network
# ============================================================

# Default interface to display (empty = auto)
net_iface = ""

# Show interface bandwidth as combined upload + download
net_sync = false
