# Ben's custom keybinds
$mainMod = SUPER
$terminal = ghostty
$fileManager = thunar
$browser = qutebrowser
$menu = wofi --show drun

# --- Core actions ---
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, N, exec, obsidian
bind = $mainMod, M, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, R, exec, caelestia shell launcher open
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, V, togglefloating
bind = $mainMod, T, togglesplit
bind = ALT, L, exec, hyprlock
bind = $mainMod, grave, exec, wlogout

# --- Screenshot ---
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# --- Clipboard history ---
bind = $mainMod, C, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# --- Volume & brightness ---
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindel = , XF86AudioMute, exec, pamixer -t
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# --- Focus ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# --- Move windows ---
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# --- Resize ---
binde = $mainMod ALT, H, resizeactive, -40 0
binde = $mainMod ALT, J, resizeactive, 0 40
binde = $mainMod ALT, K, resizeactive, 0 -40
binde = $mainMod ALT, L, resizeactive, 40 0
binde = $mainMod ALT, left, resizeactive, -40 0
binde = $mainMod ALT, right, resizeactive, 40 0
binde = $mainMod ALT, up, resizeactive, 0 -40
binde = $mainMod ALT, down, resizeactive, 0 40

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:magic

# --- Mouse ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Window rules ---
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(imv)$, float on
windowrule = match:class ^(easyeffects)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:class ^(org.kde.dolphin)$, size 900 600
windowrule = match:class ^(pavucontrol)$, size 700 450

exec-once = hyprswitch init --show-title &

bind = ALT, Tab, cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev
bind = $mainMod, P, pin

# Select res for sunshine
bind = $mainMod, F1, exec, ~/.local/bin/switch-virtual-res.sh retroid
bind = $mainMod, F2, exec, ~/.local/bin/switch-virtual-res.sh ipad-family
bind = $mainMod, F3, exec, ~/.local/bin/switch-virtual-res.sh ipad-family
bind = $mainMod, F4, exec, ~/.local/bin/switch-virtual-res.sh off
