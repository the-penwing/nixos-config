#############
### INPUT ###
#############

input {
    kb_layout = au
    follow_mouse = 1
    # Lower sensitivity for accuracy (flat profile needs less boost)
    # Sensitivity + flat accel = predictable 1:1 pointer movement
    sensitivity = 0.15
    # Flat = linear, no acceleration curves (best for precision)
    accel_profile = flat
    kb_options = compose:ralt
    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        # Boost scroll speed slightly (was 0.8, now faster but not overwhelming)
        scroll_factor = 1.2
        # Optional: lower tap-to-click pressure threshold
        # tap_button_map = lmr  # (already default)
        # Optional: speed up cursor movement on touchpad swipes
        # (Hyprland doesn't have direct "move_speed" but sensitivity + accel_profile help)
    }
}

# Hyprland 0.51+ gesture syntax
gestures {
    gesture = 3, horizontal, workspace
    gesture = 3, up, workspace, special:magic
}
