"$schema" = "https://starship.rs/config-schema.json"
palette = "dracula"
add_newline = true

format = '''
[┌─╼](brightyellow)$directory$git_branch$git_status
[├─╼](brightyellow)$username$hostname$nix_shell$python
$character'''

[palettes.dracula]
# Backgrounds and Foregrounds
background = "#282a36"
foreground = "#f8f8f2"
comment = "#6272a4"

# Bright Colours (main accent colors)
brightred = "#ff5555"
brightgreen = "#50fa7b"
brightyellow = "#f1fa8c"
brightblue = "#bd93f9"
brightpurple = "#bd93f9"
brightaqua = "#8be9fd"
brightorange = "#ffb86c"

# Neutral Colours
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#bd93f9"
purple = "#bd93f9"
aqua = "#8be9fd"
orange = "#ffb86c"

# Dim Colours
dimred = "#ff5555"
dimgreen = "#50fa7b"
dimyellow = "#f1fa8c"
dimblue = "#bd93f9"
dimpurple = "#bd93f9"
dimaqua = "#8be9fd"
dimorange = "#ffb86c"

# Light shades for text
light0 = "#f8f8f2"
light1 = "#f8f8f2"
light2 = "#e0e0e0"
light3 = "#c0c0c0"
light4 = "#6272a4"
fg1 = "#f8f8f2"

[directory]
style = "fg1"
format = '\[[$path]($style)\]'
truncate_to_repo = true
truncation_length = 3
fish_style_pwd_dir_length = 1

[username]
style_user = "green"
style_root = "red"
format = '\[[$user]($style)'
disabled = false
show_always = true

[hostname]
ssh_only = false
style = "aqua"
format = '[@$hostname]($style)\]'
disabled = false

[character]
success_symbol = "[└────╼](brightyellow)"
error_symbol = "[└╼](brightorange)"

[git_branch]
style = "yellow"
format = '\[[$symbol$branch](yellow)\](yellow)'
symbol = ""

[git_status]
style = "fg1"
format = '([\[$all_status$ahead_behind\]]($style))'
ahead = "[⇡$count](blue)"
behind = "[⇣$count](blue)"
diverged = "[⇡$ahead_count⇣$behind_count](blue)"
modified = "[*](orange)"
staged = "[+](green)"
untracked = "[?](orange)"
deleted = "[✘](red)"
conflicted = "[~](red)"

[python]
format = '\[[${symbol}${version}](brightyellow)\][(\[$virtualenv\])]($style)'
symbol = "[󰌠 ](brightyellow)"
style = "fg1"
version_format = "v${raw}"

[nix_shell]
symbol = "[󱄅 ](brightgreen)"
style = "fg1"
impure_msg = "[impure](red)"
pure_msg = "[pure](brightgreen)"
unknown_msg = "[unknown](yellow)"
format = '[\[](fg1)[via](blue)${symbol}[${name}](blue)[\]](fg1)'
