"$schema" = 'https://starship.rs/config-schema.json'
palette     = "gruvbox_dark_soft"
add_newline = true

format = '''
[┌─╼](red_n)$directory$git_branch$git_status$username$hostname
[├─╼](red_n)$python
$character'''

[palettes.gruvbox_dark_soft]
# backgrounds
bg0_s  = "#32302f"
bg1    = "#3c3836"
bg2    = "#504945"
bg3    = "#665c54"
bg4    = "#7c6f64"
# foregrounds
fg0    = "#fbf1c7"
fg1    = "#ebdbb2"
fg2    = "#d5c4a1"
fg3    = "#bdae93"
fg4    = "#a89984"
gray   = "#928374"
# accents (bright variants — correct for dark mode)
red    = "#fb4934"
green  = "#b8bb26"
yellow = "#fabd2f"
blue   = "#83a598"
purple = "#d3869b"
aqua   = "#8ec07c"
orange = "#fe8019"
# neutral variants (for subtler use)
red_n    = "#cc241d"
green_n  = "#98971a"
yellow_n = "#d79921"
blue_n   = "#458588"
purple_n = "#b16286"
aqua_n   = "#689d6a"
orange_n = "#d65d0e"

[directory]
style             = "fg1"
format            = '\[[$path]($style)\]'
truncation_length = 0
truncate_to_repo  = false

[username]
style_user = "aqua_n"
style_root = "red_n"
format = '\[[$user]($style)'
disabled = false
show_always = true

[hostname]
ssh_only = false
style    = "aqua_n"
format   = '[@$hostname]($style)\]'
disabled = false

[character]
success_symbol = "[└────╼](red_n)"
error_symbol   = "[└╼](orange_n)"

[git_branch]
style  = "yellow_n"
format = '\[[$symbol$branch](yellow)\](yellow_n)'
symbol = ""

[git_status]
style      = "fg1"
format     = '([\[$all_status$ahead_behind\]]($style))'
ahead      = "[⇡$count](blue)"
behind     = "[⇣$count](blue)"
diverged   = "[⇡$ahead_count⇣$behind_count](blue)"
modified   = "[*](orange)"
staged     = "[+](green)"
untracked  = "[?](orange)"
deleted    = "[✘](red)"
conflicted = "[~](red)"

[python]
format         = '\[[${symbol}${version}](yellow)\][(\[$virtualenv\])]($style)'
symbol         = '[ ](yellow)'
style          = 'fg1'
version_format = "v${raw}"
